on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          server-dir: ./www/webshop-Quintenntje/
          exclude: |
            **/.git*
            **/.git*/**
            **/.ddev/**
            **/.vscode/**
            **/node_modules/**

      - name: 🔨 Update and build project
        run: |
          composer install
          npm install
          npm run build

      - name: 🔒 Give permissions to the web server    
        run: |
         chmod -R 775 storage
         chmod -R 775 bootstrap/cache
         chmod -R 775 public
         chmod -R 775 app
         chmod -R 775 config
         chmod -R 775 database
         chmod -R 775 resources
         chmod -R 775 routes
         chmod -R 775 tests
         chmod -R 775 vendor
